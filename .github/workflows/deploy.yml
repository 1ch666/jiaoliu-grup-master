name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Cloudflare worker
        run: npm run build:cloudflare

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Add the missing secrets in GitHub repo Settings -> Secrets and variables -> Actions." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Warm deployed site
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          url="${DEPLOYMENT_URL:-https://jiaoliu-grup.yichengc869.workers.dev}"
          curl --retry 5 --retry-all-errors --retry-delay 3 --fail --silent --show-error "$url" > /dev/null
          curl --retry 5 --retry-all-errors --retry-delay 3 --fail --silent --show-error "$url/api/external" > /dev/null

      - name: Show deployment URL
        if: steps.deploy.outputs.deployment-url != ''
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "### Cloudflare deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open deployed site]($DEPLOYMENT_URL)" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL"
