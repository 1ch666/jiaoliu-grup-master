name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          EXTERNAL_API_URL: https://jsonplaceholder.typicode.com/posts/1
          EXTERNAL_API_KEY: ""

      - name: Build Cloudflare worker
        run: npx opennextjs-cloudflare build
        env:
          EXTERNAL_API_URL: https://jsonplaceholder.typicode.com/posts/1
          EXTERNAL_API_KEY: ""
